name: Terraform Deploy

on:
  push:
    branches: [main]
  pull_request:
        branches: [main]

env:
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  TF_VAR_vm_admin_username: ${{ secrets.TF_VAR_vm_admin_username }}
  TF_VAR_vm_admin_password: ${{ secrets.TF_VAR_vm_admin_password }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./environments/dev

    steps:
    - uses: actions/checkout@v4

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init -backend-config="resource_group_name=rg-tfstate"
                          -backend-config="storage_account_name=rizjaisetfstate" 
                          -backend-config="container_name=tfstate"
                          -backend-config="key=dev.terraform.tfstate"

    - name: Terraform Plan
      run: terraform plan

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve